<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DR Setlist Creator</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0e0e10; --surface: #1a1a1e; --surface2: #242428;
      --border: #2e2e34; --accent: #f0c040; --accent-dim: rgba(240,192,64,0.12);
      --text: #e8e8ec; --muted: #7a7a88; --danger: #e05555; --green: #4caf82;
      --ai: #7c6af7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; min-height: 100vh; }

    /* TOP BAR */
    header { border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--accent); white-space: nowrap; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    #sheet-url { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 5px 9px; outline: none; width: 320px; }
    #sheet-url:focus { border-color: var(--accent); }
    .btn { border: none; border-radius: 4px; padding: 5px 13px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
    .btn-accent { background: var(--accent); color: #0e0e10; }
    .btn-accent:hover { background: #ffd060; }
    .btn-outline { background: none; border: 1px solid var(--border); color: var(--muted); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn-ai { background: var(--ai); color: white; }
    .btn-ai:hover { background: #9585f8; }
    .btn-danger { background: none; border: 1px solid var(--border); color: var(--muted); }
    .btn-danger:hover { border-color: var(--danger); color: var(--danger); }
    #status { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; white-space: nowrap; }

    /* THREE-COLUMN LAYOUT */
    .app { display: grid; grid-template-columns: 320px 1fr 380px; height: calc(100vh - 53px); }

    /* ── LEFT: GIG SETUP ── */
    .gig-panel { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
    .gig-panel::-webkit-scrollbar { width: 4px; }
    .gig-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 1.2px; color: var(--muted); margin-bottom: 10px; }

    label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; margin-top: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    label:first-of-type { margin-top: 0; }
    input[type=text], input[type=number], select, textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 4px; color: var(--text); font-size: 13px; padding: 7px 9px;
      outline: none; font-family: 'Inter', sans-serif;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 70px; font-size: 12px; line-height: 1.5; }

    .tag-grid { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 2px; }
    .tag { padding: 4px 10px; border-radius: 3px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); color: var(--muted); background: none; transition: all 0.15s; }
    .tag:hover { border-color: var(--accent); color: var(--accent); }
    .tag.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    .set-row { display: grid; grid-template-columns: 1fr 80px 24px; align-items: center; gap: 6px; margin-bottom: 6px; }
    .set-row input { margin: 0; }
    .set-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); white-space: nowrap; }
    .icon-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 2px; transition: color 0.1s; }
    .icon-btn:hover { color: var(--danger); }
    .add-set-btn { font-size: 12px; color: var(--accent); background: none; border: 1px dashed var(--border); border-radius: 4px; padding: 5px; width: 100%; cursor: pointer; transition: all 0.1s; }
    .add-set-btn:hover { border-color: var(--accent); }

    .ai-generate-area { padding: 14px 16px; }
    .ai-generate-area .btn-ai { width: 100%; padding: 9px; font-size: 13px; }
    .ai-spinner { display: none; text-align: center; color: var(--ai); font-size: 12px; margin-top: 8px; }

    /* ── MIDDLE: LIBRARY ── */
    .library { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .lib-header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 7px; }
    .lib-title { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 1.2px; color: var(--muted); }
    .filters { display: flex; gap: 5px; flex-wrap: wrap; }
    .filters input, .filters select { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 12px; padding: 5px 7px; outline: none; font-family: 'Inter', sans-serif; flex: 1; min-width: 90px; }
    .filters input:focus, .filters select:focus { border-color: var(--accent); }

    .col-headers { display: grid; grid-template-columns: 1fr 55px 65px 80px 60px 50px 26px; padding: 5px 12px; gap: 6px; background: var(--surface); border-bottom: 1px solid var(--border); }
    .col-headers span { font-size: 9px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); }

    .song-list { flex: 1; overflow-y: auto; }
    .song-list::-webkit-scrollbar { width: 4px; }
    .song-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .song-row { display: grid; grid-template-columns: 1fr 55px 65px 80px 60px 50px 26px; align-items: center; padding: 7px 12px; border-bottom: 1px solid var(--border); gap: 6px; transition: background 0.1s; }
    .song-row:hover { background: var(--surface); }
    .song-row .title { font-weight: 500; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .song-row .meta { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .genre-badge { display: inline-block; font-size: 9px; font-weight: 600; padding: 2px 4px; border-radius: 2px; background: var(--accent-dim); color: var(--accent); text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
    .singers-cell { display: flex; gap: 2px; flex-wrap: wrap; }
    .sdot { font-size: 8px; padding: 1px 3px; border-radius: 2px; font-weight: 600; }
    .sdot.yes { background: rgba(76,175,130,0.2); color: var(--green); }
    .sdot.maybe { background: rgba(240,192,64,0.15); color: var(--accent); }
    .add-btn { background: none; border: 1px solid var(--border); border-radius: 3px; color: var(--muted); cursor: pointer; width: 22px; height: 22px; font-size: 15px; display: flex; align-items: center; justify-content: center; transition: all 0.1s; flex-shrink: 0; }
    .add-btn:hover { background: var(--accent); color: #0e0e10; border-color: var(--accent); }
    .add-btn.added { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .empty-msg { padding: 28px 16px; text-align: center; color: var(--muted); font-size: 12px; }
    .hist-badge { font-size: 9px; font-weight: 700; font-family: 'JetBrains Mono', monospace; padding: 2px 4px; border-radius: 2px; background: rgba(76,175,130,0.15); color: var(--green); white-space: nowrap; }
    .hist-badge.new { background: rgba(124,106,247,0.15); color: var(--ai); }

    /* ── RIGHT: RUNSHEET ── */
    .runsheet-panel { display: flex; flex-direction: column; overflow: hidden; }
    .runsheet-header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .runsheet-title-wrap { display: flex; flex-direction: column; gap: 2px; }
    #runsheet-name { background: none; border: none; color: var(--text); font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1.5px; outline: none; width: 200px; }
    #runsheet-name::placeholder { color: var(--muted); }
    .runsheet-meta { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
    .runsheet-actions { display: flex; gap: 5px; }

    .runsheet-body { flex: 1; overflow-y: auto; padding: 8px 0; }
    .runsheet-body::-webkit-scrollbar { width: 4px; }
    .runsheet-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* SET BLOCK */
    .set-block { margin-bottom: 4px; }
    .set-block-header { padding: 7px 14px; background: var(--surface); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); border-top: 1px solid var(--border); }
    .set-block-title { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 1.2px; color: var(--accent); }
    .set-block-meta { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

    /* RUNSHEET ITEM */
    .run-item { border-bottom: 1px solid var(--border); }
    .run-song { display: grid; grid-template-columns: 20px 1fr auto; align-items: start; padding: 8px 14px 4px; gap: 8px; cursor: grab; transition: background 0.1s; }
    .run-song:hover { background: var(--surface); }
    .run-song:active { cursor: grabbing; }
    .run-song.drag-over { border-top: 2px solid var(--accent); }
    .run-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); padding-top: 2px; }
    .run-song-info .run-title { font-weight: 500; font-size: 12px; }
    .run-song-info .run-detail { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-top: 1px; }
    .run-remove { background: none; border: none; color: var(--border); cursor: pointer; font-size: 15px; padding: 1px 3px; border-radius: 2px; transition: color 0.1s; }
    .run-remove:hover { color: var(--danger); }

    /* TRANSITION / FLOW NOTE */
    .flow-note { padding: 4px 14px 8px 42px; }
    .flow-note-inner { position: relative; }
    .flow-note textarea {
      width: 100%; background: transparent; border: none; border-left: 2px solid var(--border);
      color: var(--muted); font-size: 11px; font-family: 'Inter', sans-serif;
      padding: 4px 8px; outline: none; resize: none; line-height: 1.5;
      min-height: 32px; transition: border-color 0.1s;
    }
    .flow-note textarea:focus { border-color: var(--ai); color: var(--text); background: var(--surface2); }
    .flow-note textarea.ai-generated { border-color: var(--ai); color: #a89cf7; font-style: italic; }
    .flow-note textarea.user-edited { border-color: var(--border); color: var(--muted); font-style: normal; }

    /* BREAK BLOCK */
    .break-block { padding: 8px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; background: var(--surface2); }
    .break-label { font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 1px; color: var(--muted); }
    .break-mins { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

    .empty-runsheet { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 8px; color: var(--muted); }
    .empty-runsheet .icon { font-size: 32px; opacity: 0.2; }
    .empty-runsheet p { font-size: 12px; }

    /* PRINT */
    @media print {
      header, .gig-panel, .library, .runsheet-actions, .run-remove, .add-btn { display: none !important; }
      body { background: white; color: black; font-size: 12px; }
      .app { display: block; height: auto; }
      .runsheet-panel { display: block; overflow: visible; }
      .runsheet-body { overflow: visible; }
      .runsheet-header { border-bottom: 2px solid black; padding: 0 0 10px; margin-bottom: 8px; }
      #runsheet-name { color: black; font-size: 22px; }
      .runsheet-meta { color: #555; }
      .set-block-header { background: #eee; }
      .set-block-title { color: black; }
      .run-num { color: black; }
      .flow-note textarea { color: #444; border-left-color: #aaa; font-style: italic; background: transparent; }
      .break-block { background: #f5f5f5; }
    }
  
    /* ── WIZARD ── */
    .wizard-step { border-bottom: 1px solid var(--border); }
    .wizard-step.locked { opacity: 0.5; }
    .wizard-step.locked .step-header { cursor: default; }
    .wizard-step:not(.locked) .step-header { cursor: pointer; }

    .step-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; transition: background 0.1s; }
    .step-header:hover { background: var(--surface); }
    .step-num { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: #0e0e10; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .wizard-step.locked .step-num { background: var(--border); color: var(--muted); }
    .wizard-step.complete .step-num { background: var(--green); }
    .step-title { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 1.2px; flex: 1; }
    .step-check { color: var(--green); font-size: 13px; font-weight: 700; }

    .step-body { padding: 4px 16px 14px; display: flex; flex-direction: column; gap: 0; }
    .step-body label { display: block; font-size: 10px; color: var(--muted); margin-bottom: 4px; margin-top: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .step-body label:first-child { margin-top: 4px; }
    .step-body input[type=text], .step-body textarea, .step-body select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 4px; color: var(--text); font-size: 13px; padding: 7px 9px;
      outline: none; font-family: 'Inter', sans-serif;
    }
    .step-body input:focus, .step-body textarea:focus { border-color: var(--accent); }
    .step-body textarea { resize: vertical; min-height: 60px; font-size: 12px; line-height: 1.5; }

    .personnel-grid { display: flex; flex-direction: column; gap: 5px; margin-top: 4px; }
    .person-check { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; padding: 5px 8px; border-radius: 4px; border: 1px solid var(--border); transition: all 0.1s; }
    .person-check:hover { border-color: var(--accent); background: var(--accent-dim); }
    .person-check input { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }
    .person-check.checked { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); font-weight: 500; }

    .personnel-summary { margin-top: 10px; padding: 8px 10px; background: var(--surface2); border-radius: 4px; font-size: 11px; color: var(--muted); line-height: 1.7; border: 1px solid var(--border); }
    .personnel-summary .cut-warning { color: var(--accent); font-weight: 600; }

    .wizard-next { margin-top: 12px; width: 100%; background: var(--accent); border: none; color: #0e0e10; border-radius: 4px; padding: 9px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; letter-spacing: 0.3px; }
    .wizard-next:hover { background: #ffd060; }

    .tag-grid { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
    .tag { padding: 4px 10px; border-radius: 3px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); color: var(--muted); background: none; transition: all 0.15s; }
    .tag:hover { border-color: var(--accent); color: var(--accent); }
    .tag.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    .add-set-btn { font-size: 12px; color: var(--accent); background: none; border: 1px dashed var(--border); border-radius: 4px; padding: 5px; width: 100%; cursor: pointer; transition: all 0.1s; margin-top: 6px; }
    .add-set-btn:hover { border-color: var(--accent); }
    .set-row { display: grid; grid-template-columns: 1fr 80px 24px; align-items: center; gap: 6px; margin-bottom: 6px; }
    .set-row input { margin: 0; }
    .icon-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 2px; transition: color 0.1s; }
    .icon-btn:hover { color: var(--danger); }

    .cutdown-note { display:none; margin-top:10px; padding:7px 9px; background:rgba(240,192,64,0.1); border:1px solid rgba(240,192,64,0.4); border-radius:4px; font-size:11px; color:var(--accent); line-height:1.5; }

    section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 1.2px; color: var(--muted); margin-bottom: 10px; }

    /* ai generate area */
    .ai-generate-area { padding: 14px 16px; }
    .ai-generate-area .btn-ai { width: 100%; padding: 9px; font-size: 13px; }
    .ai-spinner { display: none; text-align: center; color: var(--ai); font-size: 12px; margin-top: 8px; font-style: italic; }

  
    /* ENCORE */
    .encore-bar { border-bottom: 1px solid var(--border); background: var(--surface); padding: 8px 14px; }
    .encore-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .encore-label { font-family: "Bebas Neue", sans-serif; font-size: 13px; letter-spacing: 1.5px; color: var(--accent); flex: 1; }
    .encore-slot { font-size: 12px; color: var(--muted); padding: 4px 0; }
    .encore-option { display: inline-flex; align-items: center; gap: 6px; margin: 3px 4px 3px 0; padding: 5px 10px; border-radius: 4px; border: 1px solid var(--border); font-size: 12px; cursor: pointer; transition: all 0.1s; background: none; color: var(--text); }
    .encore-option:hover { border-color: var(--accent); background: var(--accent-dim); }
    .encore-option.selected { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); font-weight: 600; }
    .encore-option .enc-singer { font-size: 10px; color: var(--muted); }
    .encore-option.selected .enc-singer { color: var(--accent); }

    /* COMBO SINGER */
    .singer-assign { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 3px; }
    .singer-btn { font-size: 10px; padding: 2px 7px; border-radius: 3px; border: 1px solid var(--border); background: none; color: var(--muted); cursor: pointer; transition: all 0.1s; }
    .singer-btn:hover { border-color: var(--accent); color: var(--accent); }
    .singer-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); font-weight: 600; }

    /* HORN INDICATOR */
    .horn-star { color: var(--accent); font-size: 11px; margin-left: 2px; }

    /* PRINT STYLES - match DR doc format */
    @media print {
      header, #sheet-bar, .library, .gig-panel, .runsheet-actions,
      .run-remove, .encore-bar .btn-sm, #showflow-bar,
      .singer-assign, .flow-note { display: none !important; }

      body { background: white; color: black; font-family: Arial, sans-serif; font-size: 11pt; }
      .app { display: block; height: auto; }
      .runsheet-panel { display: block; overflow: visible; }
      .encore-bar { display: block !important; background: white; border: none; padding: 0; margin-top: 12px; }
      .encore-label { font-size: 13pt; font-weight: bold; }
      .encore-slot { color: black; }
      .encore-option.selected { border: none; background: none; color: black; font-weight: bold; padding: 0; }
      .encore-option:not(.selected) { display: none; }

      #print-header { display: block !important; }
      .runsheet-header { display: none; }
      #runsheet-body { overflow: visible; padding: 0; }

      .set-block-header { background: none; border: none; border-bottom: 1px solid #999; padding: 8px 0 4px; margin-top: 14px; }
      .set-block-title { font-size: 13pt; font-weight: bold; color: black; }
      .set-block-meta { display: none; }

      .run-item { border: none; page-break-inside: avoid; }
      .run-song { padding: 3px 0; cursor: default; border: none; background: none !important; }
      .run-num { color: black; font-family: Arial; }
      .run-title { font-weight: bold; font-size: 11pt; }
      .run-detail-print { display: block !important; font-size: 10pt; color: #333; }
      .break-block { background: none; border-top: 1px dashed #999; border-bottom: none; padding: 6px 0; }
      .break-label { font-weight: bold; color: #555; }
    }

    /* Print header (hidden on screen) */
    #print-header { display: none; }

  </style>
</head>
<body>

<!-- PRINT HEADER (hidden on screen, shown on print) -->
<div id="print-header">
  <div id="ph-title" style="font-size:16pt;font-weight:bold;margin-bottom:6px"></div>
  <div id="ph-meta" style="font-size:10pt;margin-bottom:12px;color:#444"></div>
  <div id="ph-personnel" style="font-size:10pt;margin-bottom:16px;line-height:1.8;border-bottom:2px solid black;padding-bottom:10px"></div>
</div>

<header>
  <h1>DR Setlist Creator</h1>
  <div class="header-right">
    <input id="sheet-url" type="text" placeholder="Google Sheet CSV URL…"
      value="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ94KIxEH-9Gssi6ZRaNqBJp91G4hsgyMVhpST68IhN27Daly4UR31xGLYcWOYSL_Ba3wCXeOYvRDor/pub?output=csv"/>
    <button class="btn btn-accent" onclick="loadSheet()">Load URL</button>
    <label style="background:#4caf82;color:#0e0e10;font-weight:600;font-size:12px;padding:5px 13px;border-radius:4px;cursor:pointer;white-space:nowrap;margin:0">
      📂 Load CSV File
      <input type="file" accept=".csv" onchange="loadCSVFile(this)" style="display:none"/>
    </label>
    <span id="status">Ready</span>
  </div>
</header>

// ── SHEET ──
async function loadSheet() {
  const url = document.getElementById('sheet-url').value.trim();
  if (!url) return;
  setStatus('Loading…');

  // Try direct fetch first (works if CORS allows), then fall back to proxies
  const proxies = [
    u => u, // direct
    u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
    u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  ];

  for (let i = 0; i < proxies.length; i++) {
    try {
      setStatus(`Loading… (attempt ${i+1})`);
      const res = await fetch(proxies[i](url));
      if (!res.ok) continue;
      let csv;
      if (i === 0 || i === 2 || i === 3) {
        csv = await res.text();
      } else {
        const json = await res.json();
        csv = json.contents;
      }
      if (!csv || csv.length < 10) continue;
      allSongs = parseCSV(csv);
      if (!allSongs.length) continue;
      populateGenres();
      renderLibrary();
      document.getElementById('song-total').textContent = allSongs.length + ' songs';
      setStatus(`✓ ${allSongs.length} songs`);
      return;
    } catch(e) { continue; }
  }
  setStatus('Failed to load — see instructions below', true);
  document.getElementById('song-list').innerHTML = `
    <div class="empty-msg" style="text-align:left;padding:20px;line-height:1.8">
      <strong style="color:var(--accent)">Could not fetch the sheet automatically.</strong><br><br>
      Try this workaround:<br>
      1. Open your Google Sheet<br>
      2. <strong>File → Download → CSV</strong><br>
      3. Click the 📂 button below to load it directly<br><br>
      <input type="file" accept=".csv" onchange="loadCSVFile(this)" style="color:var(--text);font-size:12px"/>
    </div>`;
}

function loadCSVFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    allSongs = parseCSV(e.target.result);
    populateGenres();
    renderLibrary();
    document.getElementById('song-total').textContent = allSongs.length + ' songs';
    setStatus(`✓ ${allSongs.length} songs (from file)`);
  };
  reader.readAsText(file);
}

function setStatus(msg, err=false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.color = err ? '#e05555' : '#7a7a88';
}

function parseCSV(csv) {
  const lines = csv.trim().split('\n');
  const headers = smartSplit(lines[0]).map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const vals = smartSplit(line);
    const obj = {};
    headers.forEach((h,i) => obj[h] = (vals[i]||'').trim().replace(/^"|"$/g,''));
    return obj;
  }).filter(s => s['Song']);
}

function smartSplit(line) {
  const r=[]; let cur='', inQ=false;
  for(let ch of line){
    if(ch==='"') inQ=!inQ;
    else if(ch===','&&!inQ){r.push(cur);cur='';}
    else cur+=ch;
  }
  r.push(cur); return r;
}

function populateGenres() {
  const g = new Set();
  allSongs.forEach(s => (s['Genre']||'').split(',').forEach(x => g.add(x.trim())));
  document.getElementById('filter-genre').innerHTML =
    '<option value="">All Genres</option>' +
    [...g].sort().map(x => `<option>${x}</option>`).join('');
}

function getGigScore(s) {
  // Score each song 0-100 for relevance to current gig context
  let score = 0;
  const kb = findKB(s['Song']);
  const playCount = kb ? kb.play_count : 0;
  const genre = (s['Genre']||'').toLowerCase();
  const isPatriotic = !!(s['Patriotic']||'').trim();
  const isAcoustic = !!(s['Acoustic']||'').trim();
  const hasHorns = !!(s['Horns']||'').trim();

  // Get current gig context
  const activeTags = (id) => [...(document.getElementById(id)||{querySelectorAll:()=>[]}).querySelectorAll('.tag.active')].map(t=>t.textContent.toLowerCase());
  const eventTypes = activeTags('event-type-tags');
  const climate = activeTags('climate-tags');
  const ageRange = activeTags('age-tags');
  const energy = activeTags('energy-tags');
  const notes = (document.getElementById('gig-notes')||{value:''}).value.toLowerCase();

  // Play history bonus (road-tested = reliable)
  if (playCount >= 15) score += 30;
  else if (playCount >= 8) score += 22;
  else if (playCount >= 4) score += 15;
  else if (playCount >= 2) score += 8;
  else if (playCount === 1) score += 3;

  // Band config match
  if (bandConfig.horns === 'full' && hasHorns) score += 8;
  if (bandConfig.guitars === 'cut' || bandConfig.keys === 'cut') {
    if (kb && kb.cut_guitar_count > 0) score += 10;
    else if (kb && kb.full_guitar_count >= 2 && kb.cut_guitar_count === 0) score -= 20;
  }

  // Event type relevance
  if (eventTypes.includes('military ball') || eventTypes.includes('ceremony')) {
    if (isPatriotic) score += 25;
    if (genre.includes('country')) score += 10;
    if (genre.includes('classic rock')) score += 8;
    if (genre.includes('r&b') || genre.includes('funk')) score += 5;
    if (notes.includes('patriotic') || notes.includes('military') || notes.includes('army')) score += 10;
  }
  if (eventTypes.includes('wedding')) {
    if (!!(s['Wedding Band Vibes']||'').trim()) score += 20;
    if (genre.includes('pop') || genre.includes('soul')) score += 8;
    if (genre.includes('ballad')) score += 5;
  }
  if (eventTypes.includes('corporate') || eventTypes.includes('concert') || eventTypes.includes('outdoor festival')) {
    if (genre.includes('pop') || genre.includes('rock')) score += 10;
    if (genre.includes('funk') || genre.includes('r&b')) score += 8;
  }

  // Climate relevance
  if (climate.includes('conservative') || climate.includes('patriotic')) {
    if (isPatriotic) score += 20;
    if (genre.includes('country')) score += 12;
    if (genre.includes('classic rock')) score += 8;
  }
  if (climate.includes('liberal') || climate.includes('diverse')) {
    if (genre.includes('r&b') || genre.includes('pop') || genre.includes('funk')) score += 10;
    if (genre.includes('soul')) score += 8;
  }
  if (climate.includes('mixed')) {
    // Crowd-pleasers do well with mixed
    if (playCount >= 10) score += 10;
  }

  // Age range
  if (ageRange.includes('young adults')) {
    if (genre.includes('pop') || genre.includes('rock')) score += 10;
    const year = parseInt(s['Year']||0);
    if (year >= 2015) score += 8;
    if (year >= 2020) score += 5;
  }
  if (ageRange.includes('30s–50s') || ageRange.includes('older crowd')) {
    if (genre.includes('classic rock') || genre.includes('motown') || genre.includes('country')) score += 12;
    const year = parseInt(s['Year']||0);
    if (year >= 1970 && year <= 2005) score += 6;
  }
  if (ageRange.includes('all ages')) {
    if (playCount >= 8) score += 8; // Proven crowd-pleasers
  }

  // Energy match
  if (energy.includes('high energy')) {
    if (genre.includes('rock') || genre.includes('funk') || genre.includes('pop')) score += 8;
    if (genre.includes('ballad')) score -= 10;
  }
  if (energy.includes('dinner / chill')) {
    if (genre.includes('ballad') || genre.includes('soul') || isAcoustic) score += 10;
    if (genre.includes('hard rock') || genre.includes('metal')) score -= 15;
  }

  // Notes keywords
  if (notes) {
    const songName = s['Song'].toLowerCase();
    const artist = (s['Artist']||'').toLowerCase();
    if (notes.includes('patriotic') && isPatriotic) score += 15;
    if (notes.includes('country') && genre.includes('country')) score += 12;
    if (notes.includes('motown') && genre.includes('motown')) score += 12;
    if (notes.includes('rock') && genre.includes('rock')) score += 10;
    if (notes.includes('kids') && (genre.includes('kids') || playCount >= 5)) score += 8;
  }

  return score;
}

  const inRunsheet = new Set(runsheet.filter(r=>r.type==='song').map(r=>r.song['Song']));

  let filtered = allSongs.filter(s => {
    if(search){const t=(s['Song']||'')+(s['Artist']||'')+(s['Genre']||''); if(!t.toLowerCase().includes(search)) return false;}
    if(singer){const v=(s[singer]||'').toUpperCase(); if(v!=='X'&&v!=='X?') return false;}
    if(genre && !(s['Genre']||'').includes(genre)) return false;
    if(hornsF === 'has_horns' && !(s['Horns']||'').trim()) return false;
    if(hornsF === 'no_horns' && (s['Horns']||'').trim()) return false;
    if(flag === 'cut_safe') {
      const kb = findKB(s['Song']);
      if(!kb || kb.cut_guitar_count === 0) return false;
    } else if(flag){
      const v=(s[flag]||'').trim().toUpperCase(); if(!v||v==='N/A') return false;
    }
    return true;
  });

  // Sort by gig relevance score
  const hasGigContext = document.getElementById('event-type-tags') &&
    document.getElementById('event-type-tags').querySelectorAll('.tag.active').length > 0;
  if (!search && !singer && !genre && !flag) {
    filtered.sort((a, b) => getGigScore(b) - getGigScore(a));
  }

  const list = document.getElementById('song-list');
  if(!filtered.length){ list.innerHTML='<div class="empty-msg">No songs match.</div>'; return; }

  list.innerHTML = filtered.map(s => {
    const singers = SINGER_COLS.map(sc => {
      const v=(s[sc]||'').trim().toUpperCase();
      if(v==='X') return `<span class="sdot yes">${sc.split(' ')[0][0]}</span>`;
      if(v==='X?') return `<span class="sdot maybe">${sc.split(' ')[0][0]}?</span>`;
      return '';
    }).join('');
    const added = inRunsheet.has(s['Song']);
    const enc = encodeURIComponent(JSON.stringify(s));
    
    // History badge from KB + gig relevance score
    const kb = findKB(s['Song']);
    const gigScore = getGigScore(s);
    let histBadge = '';
    let rowWarning = '';
    if(kb) {
      const pct = Math.round(100 * kb.cut_guitar_count / kb.play_count);
      const cutSafe = kb.cut_guitar_count > 0;
      const hornsSafe = kb.without_horns_count > 0;
      
      if((bandConfig.guitars === 'cut' || bandConfig.keys === 'cut') && !cutSafe && kb.play_count >= 2) {
        rowWarning = ' style="background:rgba(224,85,85,0.07)"';
      }
      if(bandConfig.horns === 'none' && !hornsSafe && (s['Horns']||'').trim() && kb.play_count >= 2) {
        rowWarning = ' style="background:rgba(224,85,85,0.07)"';
      }
      
      const plays = kb.play_count;
      // Color badge by score: green=hot, yellow=good, gray=neutral
      const badgeStyle = gigScore >= 40 ? 'style="background:rgba(76,175,130,0.3);color:#4caf82;font-weight:800"' :
                         gigScore >= 20 ? 'style="background:rgba(240,192,64,0.2);color:#f0c040"' : '';
      histBadge = `<span class="hist-badge" ${badgeStyle} title="${plays} plays · Gig score: ${gigScore}">${plays}×</span>`;
    } else {
      const badgeStyle = gigScore >= 20 ? 'style="background:rgba(240,192,64,0.2);color:#f0c040"' : '';
      histBadge = `<span class="hist-badge new" ${badgeStyle} title="No history yet · Gig score: ${gigScore}">NEW</span>`;
    }
    
    return `<div class="song-row"${rowWarning}>
      <span class="title" title="${esc(s['Song'])}">${esc(s['Song'])}</span>
      <span class="meta">${esc(s['Catalog #'])||'—'}</span>
      <span class="meta">${esc(s['Key'])||'—'}</span>
      <span class="meta" title="${esc(s['Artist'])}">${esc(s['Artist'])||'—'}</span>
      <span class="genre-badge" title="${esc(s['Genre'])}">${esc((s['Genre']||'').split(',')[0].trim())||'—'}</span>
      ${histBadge}
      <button class="add-btn${added?' added':''}" onclick="addSong('${enc}')" title="Add to runsheet">+</button>
    </div>`;
  }).join('');
}

function findKB(songName) {
  if(!songName) return null;
  const name = songName.toLowerCase().trim();
  for(const [k, v] of Object.entries(SONG_KB)) {
    if(k.toLowerCase().trim() === name) return v;
  }
  // fuzzy: starts with
  for(const [k, v] of Object.entries(SONG_KB)) {
    if(name.startsWith(k.toLowerCase().trim().substring(0,8)) && k.length > 5) return v;
  }
  return null;
}

// ── RENDER RUNSHEET ──
function renderRunsheet() {
  const el = document.getElementById('runsheet-body');
  if(!runsheet.length){
    el.innerHTML=`<div class="empty-runsheet"><div class="icon">🎵</div><p>Add songs from the library</p></div>`;
    updateMeta(); return;
  }

  // Group by set
  const grouped = {};
  let songCounter = 0;
  runsheet.forEach((item,i) => {
    const key = item.type==='song' ? `set_${item.setIndex}` : `break_${i}`;
    if(!grouped[key]) grouped[key]={type:item.type, setIndex:item.setIndex, items:[]};
    grouped[key].items.push({item,i});
  });

  // Build HTML set by set
  let html='';
  // track per-set song counts + times
  const setData={};
  runsheet.forEach(r=>{
    if(r.type!=='song') return;
    if(!setData[r.setIndex]) setData[r.setIndex]={count:0, secs:0};
    setData[r.setIndex].count++;
    const t=parseFloat(r.song['Time']);
    if(!isNaN(t)) setData[r.setIndex].secs += t*24*60*60;
  });

  let overallNum=0;
  const setsSeen=new Set();

  runsheet.forEach((item,i)=>{
    if(item.type==='break'){
      html+=`<div class="break-block">
        <span class="break-label">— BREAK —</span>
        <span class="break-mins">${item.minutes} min</span>
        <button class="icon-btn" onclick="removeItem(${i})" style="margin-left:auto">×</button>
      </div>`;
      return;
    }
    // Song
    const si = item.setIndex;
    if(!setsSeen.has(si)){
      setsSeen.add(si);
      const sd = setData[si]||{count:0,secs:0};
      const setObj = sets[si]||{name:`Set ${si+1}`,minutes:45};
      const mins = Math.round(sd.secs/60);
      const cap = setObj.minutes;
      const over = mins>cap ? ` ⚠ ${mins-cap}min over` : '';
      html+=`<div class="set-block-header">
        <span class="set-block-title">${esc(setObj.name)}</span>
        <span class="set-block-meta">${sd.count} songs · ${mins}/${cap} min${over}</span>
      </div>`;
    }
    overallNum++;
    const singers = SINGER_COLS.filter(sc=>(item.song[sc]||'').toUpperCase().startsWith('X')).map(sc=>sc.split(' ')[0]).join(', ');
    const detail = [item.song['Key'], item.song['Artist'], singers].filter(Boolean).join(' · ');
    const noteVal = item.flowNote || item.aiNote || '';
    const noteClass = item.aiNote && !item.flowNote ? 'ai-generated' : 'user-edited';
    html+=`<div class="run-item">
      <div class="run-song" draggable="true"
        ondragstart="dragStart(${i})" ondragover="dragOver(event,${i})"
        ondrop="drop(event,${i})" ondragleave="dragLeave(event)">
        <span class="run-num">${overallNum}</span>
        <div class="run-song-info">
          <div class="run-title">${esc(item.song['Song'])}</div>
          <div class="run-detail">${esc(detail)}</div>
        </div>
        <button class="run-remove" onclick="removeItem(${i})">×</button>
      </div>
      <div class="flow-note">
        <textarea class="flow-note-inner ${noteClass}" rows="2"
          placeholder="Transition / show note…"
          oninput="runsheet[${i}].flowNote=this.value; this.className='flow-note-inner user-edited'; autoResize(this)"
        >${esc(noteVal)}</textarea>
      </div>
    </div>`;
  });

  el.innerHTML=html;
  // auto-resize all textareas
  el.querySelectorAll('textarea').forEach(autoResize);
  updateMeta();
}

function autoResize(ta){ ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px'; }

function updateMeta() {
  const songs = runsheet.filter(r=>r.type==='song');
  const totalSecs = songs.reduce((s,r)=>{const t=parseFloat(r.song['Time']); return s+(isNaN(t)?0:t*24*60*60);},0);
  const mins = Math.round(totalSecs/60);
  document.getElementById('runsheet-meta').textContent =
    `${songs.length} songs${mins>0?' · ~'+mins+' min':''}`;
}

// ── DRAG & DROP ──
function dragStart(i){ dragIndex=i; }
function dragOver(e,i){ e.preventDefault(); document.querySelectorAll('.run-song').forEach(el=>el.classList.remove('drag-over')); document.querySelectorAll('.run-song')[Array.from(document.querySelectorAll('.run-item')).findIndex(el=>el.contains(event.target))]?.classList.add('drag-over'); }
function dragLeave(e){ e.target.closest('.run-song')?.classList.remove('drag-over'); }
function drop(e,i){ e.preventDefault(); document.querySelectorAll('.run-song').forEach(el=>el.classList.remove('drag-over')); if(dragIndex===null||dragIndex===i) return; const m=runsheet.splice(dragIndex,1)[0]; runsheet.splice(i,0,m); dragIndex=null; renderRunsheet(); }

// ── AI SHOW FLOW ──
async function generateFlow() {
  const songs = runsheet.filter(r=>r.type==='song');

  const gigName = document.getElementById('gig-name').value;

      const hornNote = v.with_horns_count > 0 && v.without_horns_count === 0 ? 'horns-only' : 
                       v.without_horns_count > 0 ? 'no-horns-ok' : '';
      const topSingers = Object.entries(v.singers).sort((a,b)=>b[1]-a[1]).slice(0,2).map(([s])=>s).join('/');
      return `"${name}" (${v.play_count}x, ${cutNote}${hornNote?', '+hornNote:''}, singers:${topSingers||'various'})`;
    }).join('\n');

  // Songs played less recently (candidates to dust off)
  const olderSongs = Object.entries(SONG_KB)
    .filter(([,v]) => v.play_count === 1)
    .map(([name, v]) => {
      const topSingers = Object.entries(v.singers).sort((a,b)=>b[1]-a[1]).slice(0,1).map(([s])=>s).join('/');
      return `"${name}" (singers:${topSingers||'various'})`;
    }).slice(0, 20).join('\n');

  // Available songs - smart subset: filter by band config, limit to 80 most relevant
  const availableSongs = allSongs
    .filter(s => {
      // Filter horns constraint
      if(hornConfig === 'none' && (s['Horns']||'').trim()) return false;
      // Filter cut-down constraint
      if(guitarConfig === 'cut' || keysConfig === 'cut') {
        const kb = findKB(s['Song']);
        // Only exclude if we have history showing it needs full band
        if(kb && kb.full_guitar_count >= 2 && kb.cut_guitar_count === 0) return false;
      }
      return true;
    })
    .map(s => {
      const hasHorns = !!(s['Horns']||'').trim();
      const kb = findKB(s['Song']);
      const plays = kb ? kb.play_count : 0;
      const cutSafe = kb ? (kb.cut_guitar_count > 0 ? 'yes' : 'no') : 'unknown';
      const singers = kb ? Object.entries(kb.singers).sort((a,b)=>b[1]-a[1]).slice(0,2).map(([s])=>s).join('/') : '?';
      return { str: `"${s['Song']}" (Key:${s['Key']||'?'}, Genre:${(s['Genre']||'').split(',')[0].trim()}, Horns:${hasHorns?'yes':'no'}, Cut:${cutSafe}, Plays:${plays}, Singers:${singers||'?'})`, plays };
    })
    .sort((a,b) => b.plays - a.plays)  // most played first
    .slice(0, 80)
    .map(x => x.str)
    .join('\n');

  let prompt;

  if (!hasSetlist) {
    // MODE 1: Suggest a full setlist
    const sets = window._sets || [{name:'Set 1', minutes:45}];
    const totalMins = sets.reduce((s,set)=>s+set.minutes, 0);
    const approxSongs = Math.round(totalMins / 4); // ~4 min/song average

    prompt = `You are an experienced bandleader for Downrange (DR), a professional Army band based in DC. 
You are building a setlist for an upcoming gig.

GIG DETAILS:
- Event: ${gigName||'Not specified'}
- Date: ${gigDate||'Not specified'}
- Type: ${eventType||'Not specified'}
- Audience climate: ${climate||'Not specified'}
- Age range: ${ageRange||'Not specified'}
- Energy level: ${energy||'Not specified'}
- Band config: ${guitarConfig === 'cut' ? '1 guitar (cut-down)' : '2 guitars (full)'}, ${keysConfig === 'cut' ? '1 keyboard (cut-down)' : '2 keyboards (full)'}, horns: ${hornConfig}
- Additional notes: ${gigNotes||'None'}
- Sets: ${sets.map(s=>`${s.name} (${s.minutes} min)`).join(', ')}
- Approximate songs needed: ${approxSongs}

SONG HISTORY (most played recently - these are reliable):
${recentSongs}

SONGS WE HAVEN'T PLAYED IN A WHILE (consider if time allows):
${olderSongs}

ALL AVAILABLE SONGS IN LIBRARY:
${availableSongs}

YOUR TASK:
Suggest a setlist of approximately ${approxSongs} songs from the available library that fits this gig.

RULES:
1. Prioritize recently played songs (from history) — these are road-tested
2. Only suggest songs marked "cut-safe" if guitars or keys are cut-down
3. Only suggest songs with "Horns:yes" if hornConfig is "full"; avoid them if "none"
4. Match the audience vibe — conservative/military = more patriotic/classic, younger = more current pop/rock
5. Vary the singers across the set
6. Think about energy arc — don't front-load all ballads or all bangers
7. If there's clearly time (totalMins > 60), sprinkle in 1-2 older songs we haven't played recently
8. Each set should have a strong opener and closer

Respond ONLY with this JSON (no markdown, no extra text):
{
  "setlist": [
    {"song": "Song Title", "singer": "Singer Name", "set": 1, "note": "Brief show flow note or transition cue"},
    ...
  ],
  "summary": "2-3 sentence reasoning for these choices given the gig context"
}`;

  } else {
    // MODE 2: Write show flow notes for existing setlist
    const setlistStr = songs.map((r,i)=>`${i+1}. "${r.song['Song']}" by ${r.song['Artist']} (Key: ${r.song['Key']}, Genre: ${r.song['Genre']})`).join('\n');

    prompt = `You are an experienced bandleader for Downrange (DR), a professional Army band.

GIG DETAILS:
- Event: ${gigName||'Not specified'}
- Date: ${gigDate||'Not specified'}
- Type: ${eventType||'Not specified'}
- Audience climate: ${climate||'Not specified'}
- Age range: ${ageRange||'Not specified'}
- Energy level: ${energy||'Not specified'}

- Additional notes: ${gigNotes||'None'}

SETLIST:
${setlistStr}

For EACH song write a practical show flow note (1-3 sentences):
- Banter or crowd lines to say before/after

[{"note": "..."}, ...]

  }

  document.getElementById('ai-spinner').style.display='block';

        model: 'claude-sonnet-4-6',

        messages: [{role:'user', content: prompt}]
      })
    });
    const data = await res.json();
    console.log('API response:', JSON.stringify(data).substring(0, 500));
    if (data.error) {
      throw new Error('API error: ' + data.error.type + ' — ' + data.error.message);

    if (!data.content || !data.content.length) {

    }
    const text = data.content.map(c=>c.text||'').join('');

        }
      }
      renderRunsheet();
      renderLibrary();

    } else {
      // Add flow notes to existing runsheet
      const notes = JSON.parse(clean);
      let songIdx=0;
      runsheet.forEach((r,i)=>{
        if(r.type!=='song') return;
        if(notes[songIdx]){
          runsheet[i].aiNote = notes[songIdx].note;

        }
        songIdx++;
      });
      renderRunsheet();
      document.getElementById('ai-spinner').style.display='none';
    }
  } catch(e) {
    const errMsg = e && e.message ? e.message : String(e);
    alert('AI generation failed:\n\n' + errMsg);
    console.error('AI error full:', e);
    document.getElementById('ai-spinner').style.display='none';
  } finally {
    document.querySelector('.btn-ai').disabled=false;
  }

// ── ENERGY SCORING ──
function getEnergyLevel(s) {
  const genre = (s['Genre']||'').toLowerCase();
  const kb = findKB(s['Song']);
  const plays = kb ? kb.play_count : 0;
  // High energy genres
  if (/hard rock|metal|punk|funk|dance|hip.?hop|rap|upbeat/.test(genre)) return 3;
  if (/rock|pop|r&b|country|motown|soul/.test(genre)) return 2;
  if (/ballad|jazz|acoustic|classical|slow/.test(genre)) return 1;
  // Default mid
  return 2;
}

// ── IMPROVED BUILD SETLIST with energy arc ──
function buildSetlist() {
  if (!allSongs.length) { alert('Load your song sheet first!'); return; }

  const totalMins = sets.reduce((s,set) => s + set.minutes, 0);
  const approxSongs = Math.max(8, Math.round(totalMins / 3.5));

  // Score and filter
  const scored = allSongs
    .filter(s => {
      if (bandConfig.horns === 'none' && (s['Horns']||'').trim()) return false;
      if (bandConfig.guitars === 'cut' || bandConfig.keys === 'cut') {
        const kb = findKB(s['Song']);
        if (kb && kb.full_guitar_count >= 2 && kb.cut_guitar_count === 0) return false;
      }
      if (availableSingers.length) {
        const canSing = availableSingers.some(singer => {
          const v = (s[singer]||'').trim().toUpperCase();
          return v === 'X' || v === 'X?';
        });
        if (!canSing) return false;
      }
      return true;
    })
    .map(s => ({ song: s, score: getGigScore(s), energy: getEnergyLevel(s) }))
    .sort((a, b) => b.score - a.score);

  // Pick songs balancing singers and energy arc
  const picked = [];
  const singerCount = {};
  const maxPerSinger = Math.ceil(approxSongs / Math.max(availableSingers.length, 1));
  const usedSongs = new Set();

  for (const item of scored) {
    if (picked.length >= approxSongs) break;
    const s = item.song;
    if (usedSongs.has(s['Song'])) continue;

    const possibleSingers = (availableSingers.length ? availableSingers : ['Maya R','Rettig','Tue','Patterson','Melinda R'])
      .filter(singer => {
        const v = (s[singer]||'').trim().toUpperCase();
        return v === 'X' || v === 'X?';
      })
      .sort((a, b) => (singerCount[a]||0) - (singerCount[b]||0));

    if (!possibleSingers.length) continue;
    const singer = possibleSingers[0];
    if ((singerCount[singer]||0) >= maxPerSinger && availableSingers.length > 1) continue;

    singerCount[singer] = (singerCount[singer]||0) + 1;
    usedSongs.add(s['Song']);
    picked.push({ ...item, singer });
  }

  // Apply energy arc per set: HIGH → MID → STRONG CLOSE
  // Sort each set's songs: opener (high), body (mid), closer (high/big)
  const songsPerSet = sets.map(set => Math.round(approxSongs * set.minutes / totalMins));
  let songIdx = 0;
  const allPicked = [...picked];

  runsheet = [];
  sets.forEach((set, si) => {
    const count = songsPerSet[si];
    const setSlice = allPicked.splice(0, count);
    if (!setSlice.length) return;

    // Sort by energy arc: high openers, mid body, strong closer
    const highs = setSlice.filter(x => x.energy === 3);
    const mids  = setSlice.filter(x => x.energy === 2);
    const lows  = setSlice.filter(x => x.energy === 1);

    let arranged = [];
    // Opener: highest energy
    if (highs.length) arranged.push(highs.shift());
    else if (mids.length) arranged.push(mids.shift());
    // Closer: another high or mid
    const closerPool = [...highs, ...mids];
    const closer = closerPool.length ? closerPool.pop() : null;
    // Fill middle with remaining (mix lows and mids)
    const middle = [...highs, ...mids, ...lows];
    // Interleave: don't stack all lows together
    const midArranged = [];
    let lowCount = 0;
    for (const s of middle) {
      if (s.energy === 1 && lowCount >= 2) {
        midArranged.unshift(s); lowCount = 0; // break up lows
      } else {
        midArranged.push(s);
        if (s.energy === 1) lowCount++; else lowCount = 0;
      }
    }
    arranged = [arranged[0], ...midArranged, ...(closer ? [closer] : [])].filter(Boolean);

    arranged.forEach(item => {
      runsheet.push({ type:'song', song: item.song, setIndex: si,
                      singer: item.singer, singers: [item.singer],
                      flowNote:'', aiNote:'' });
    });
    if (si < sets.length - 1) {
      runsheet.push({ type:'break', label:'Break', minutes: 15 });
    }
  });

  const gigName = document.getElementById('gig-name').value;
  if (gigName) document.getElementById('runsheet-name').value = gigName.toUpperCase();

  renderRunsheet();
  renderLibrary();
  updatePrintHeader();

  // Show encore bar and show flow button
  document.getElementById('encore-bar').style.display = 'block';
  document.getElementById('showflow-bar').style.display = 'block';

  document.getElementById('step-4').classList.add('complete');
  document.getElementById('check-4').textContent = '✓';
  setStatus(`✦ ${runsheet.filter(r=>r.type==='song').length} songs arranged`);
}

// ── ENCORE ──
let encoreSelected = null;

function suggestEncores() {
  // Build shortlist: high-scoring songs NOT already in runsheet
  const inRunsheet = new Set(runsheet.filter(r=>r.type==='song').map(r=>r.song['Song']));
  const activeTags = (id) => [...(document.getElementById(id)||{querySelectorAll:()=>[]}).querySelectorAll('.tag.active')].map(t=>t.textContent.toLowerCase());
  const eventTypes = activeTags('event-type-tags');
  const isMilitary = eventTypes.some(e => e.includes('military') || e.includes('ceremony'));
  const isWedding = eventTypes.some(e => e.includes('wedding'));

  const candidates = allSongs
    .filter(s => !inRunsheet.has(s['Song']))
    .filter(s => {
      if (availableSingers.length) {
        return availableSingers.some(singer => {
          const v = (s[singer]||'').trim().toUpperCase();
          return v === 'X' || v === 'X?';
        });
      }
      return true;
    })
    .map(s => {
      let score = getGigScore(s);
      const kb = findKB(s['Song']);
      // Encore bonus: high play count = crowd knows it
      if (kb && kb.play_count >= 10) score += 20;
      // Military encore bonus for patriotic
      if (isMilitary && (s['Patriotic']||'').trim()) score += 30;
      // Wedding: big ballad or dance floor closer
      if (isWedding && /(ballad|soul|pop)/i.test(s['Genre']||'')) score += 15;
      return { song: s, score };
    })
    .sort((a,b) => b.score - a.score)
    .slice(0, 6);

  const slot = document.getElementById('encore-slot');
  slot.innerHTML = candidates.map((c,i) => {
    const s = c.song;
    const hasHorns = !!(s['Horns']||'').trim();
    const singer = availableSingers.find(singer => (s[singer]||'').toUpperCase().startsWith('X')) || '?';
    return `<button class="encore-option${encoreSelected===s['Song']?' selected':''}" onclick="selectEncore(${i})" data-idx="${i}">
      ${s['Song']}${hasHorns?'<span class="horn-star">*</span>':''}
      <span class="enc-singer">${singer}</span>
    </button>`;
  }).join('');
  slot._candidates = candidates;
}

function selectEncore(i) {
  const slot = document.getElementById('encore-slot');
  const candidates = slot._candidates;
  if (!candidates) return;
  const chosen = candidates[i].song;
  encoreSelected = chosen['Song'];
  suggestEncores(); // re-render with selection
  updatePrintHeader();
}

function clearEncore() {
  encoreSelected = null;
  document.getElementById('encore-slot').innerHTML = 'No encore selected — click Suggest';
}

// ── COMBO SINGERS in runsheet ──
function toggleSinger(itemIdx, singer) {
  const item = runsheet[itemIdx];
  if (!item || item.type !== 'song') return;
  if (!item.singers) item.singers = [item.singer];
  if (item.singers.includes(singer)) {
    item.singers = item.singers.filter(s => s !== singer);
  } else {
    item.singers.push(singer);
  }
  if (!item.singers.length) item.singers = [singer]; // always keep at least one
  item.singer = item.singers.join(' / ');
  renderRunsheet();
}

// ── DUPLICATE PROTECTION ──
function addSong(enc) {
  const song = JSON.parse(decodeURIComponent(enc));
  const already = runsheet.some(r => r.type === 'song' && r.song['Song'] === song['Song']);
  if (already) {
    // Flash the existing song instead
    const items = document.querySelectorAll('.run-title');
    items.forEach(el => {
      if (el.textContent === song['Song']) {
        el.closest('.run-song').style.background = 'rgba(240,192,64,0.2)';
        setTimeout(() => el.closest('.run-song').style.background = '', 800);
      }
    });
    return;
  }
  const setIndex = getCurrentSetIndex();
  runsheet.push({ type:'song', song, setIndex, singer:'', singers:[], flowNote:'', aiNote:'' });
  renderRunsheet();
  renderLibrary();
}

// ── PRINT HEADER UPDATE ──
function updatePrintHeader() {
  const name = document.getElementById('gig-name').value;
  const date = document.getElementById('gig-date').value;
  const loc  = document.getElementById('gig-location').value;
  const prod = document.getElementById('gig-producer').value;

  document.getElementById('ph-title').textContent = (date ? date + '  ' : '') + (name || 'Setlist');

  // Personnel
  const checkedPeople = [...document.querySelectorAll('#body-2 input[type=checkbox]:checked')].map(c => c.value);
  const singers  = checkedPeople.filter(v => ['Maya R','Rettig','Tue','Patterson','Melinda R'].includes(v));
  const guitars  = checkedPeople.filter(v => ['Waltemire','Leader'].includes(v));
  const keys     = checkedPeople.filter(v => ['Roberts','Romero'].includes(v));
  const drums    = checkedPeople.filter(v => ['Chin','Pers'].includes(v));

  document.getElementById('ph-meta').textContent = [loc, prod ? 'Producer: ' + prod : ''].filter(Boolean).join('  ·  ');

  let personnel = '';
  if (singers.length)  personnel += `<strong>Vocals:</strong> ${singers.join(', ')}<br>`;
  const rhythm = [...guitars.map(g => g === 'Waltemire' ? 'Waltemire' : 'Leader'),
                   ...keys.map(k => k === 'Roberts' ? 'Roberts' : 'Romero'),
                   ...drums.map(d => d === 'Chin' ? 'Chin' : 'Pers')];
  if (rhythm.length)   personnel += `<strong>Rhythm:</strong> ${rhythm.join(', ')}<br>`;
  if (bandConfig.horns === 'full') personnel += `<strong>Horns:</strong> TBD<br>`;
  if (prod)            personnel += `<strong>Producer:</strong> ${prod}<br>`;

  document.getElementById('ph-personnel').innerHTML = personnel;
}

// ── SAVE / LOAD ──
function saveGig() {
  const gig = {
    name: document.getElementById('gig-name').value,
    date: document.getElementById('gig-date').value,
    location: document.getElementById('gig-location').value,
    producer: document.getElementById('gig-producer').value,
    notes: document.getElementById('gig-notes').value,
    sets,
    runsheet,
    encoreSelected,
    bandConfig,
    savedAt: new Date().toISOString()
  };
  const key = 'drsetlist_' + (gig.name || 'gig').replace(/\s+/g,'_').toLowerCase();
  localStorage.setItem(key, JSON.stringify(gig));
  localStorage.setItem('drsetlist_last', key);

  // Show saved confirmation
  const btn = document.getElementById('save-btn');
  btn.textContent = '✓ Saved';
  btn.style.color = 'var(--green)';
  setTimeout(() => { btn.textContent = 'Save'; btn.style.color = ''; }, 2000);
}

function loadGig() {
  // List saved gigs
  const keys = Object.keys(localStorage).filter(k => k.startsWith('drsetlist_') && k !== 'drsetlist_last');
  if (!keys.length) { alert('No saved gigs found.'); return; }

  const list = keys.map(k => {
    try { const g = JSON.parse(localStorage.getItem(k)); return { key: k, name: g.name, date: g.date }; }
    catch(e) { return null; }
  }).filter(Boolean);

  const choice = prompt('Saved gigs:\n' + list.map((g,i) => `${i+1}. ${g.date} — ${g.name}`).join('\n') + '\n\nEnter number to load:');
  if (!choice) return;
  const idx = parseInt(choice) - 1;
  if (isNaN(idx) || !list[idx]) return;

  const gig = JSON.parse(localStorage.getItem(list[idx].key));
  document.getElementById('gig-name').value = gig.name || '';
  document.getElementById('gig-date').value = gig.date || '';
  document.getElementById('gig-location').value = gig.location || '';
  document.getElementById('gig-producer').value = gig.producer || '';
  document.getElementById('gig-notes').value = gig.notes || '';

  if (gig.sets) { window.sets = gig.sets; sets.splice(0, sets.length, ...gig.sets); renderSets(); }
  if (gig.runsheet) { runsheet.splice(0, runsheet.length, ...gig.runsheet); }
  if (gig.bandConfig) Object.assign(bandConfig, gig.bandConfig);
  if (gig.encoreSelected) encoreSelected = gig.encoreSelected;

  renderRunsheet();
  renderLibrary();
  updatePrintHeader();
  document.getElementById('encore-bar').style.display = 'block';
  document.getElementById('showflow-bar').style.display = 'block';
  setStatus(`✓ Loaded: ${gig.name}`);
}

// ── SHOW FLOW (algorithmic, no API) ──
function generateShowFlow() {
  const songs = runsheet.filter(r => r.type === 'song');
  if (!songs.length) return;

  const activeTags = (id) => [...(document.getElementById(id)||{querySelectorAll:()=>[]}).querySelectorAll('.tag.active')].map(t=>t.textContent);
  const eventTypes = activeTags('event-type-tags').join(', ');
  const climate = activeTags('climate-tags').join(', ');
  const isMilitary = /military|ceremony/i.test(eventTypes);
  const isWedding = /wedding/i.test(eventTypes);

  // Transition phrases library
  const highToHigh = ['Right into…', 'Don\'t let \'em breathe — straight into…', 'Keep it going with…', 'No break —'];
  const highToMid  = ['Let it settle… then…', 'Take it down a notch with…', 'Bring it back with…'];
  const midToHigh  = ['Now let\'s bring it back up —', 'Time to turn it up —', 'Everybody on your feet —'];
  const midToLow   = ['Slow it down with…', 'Here\'s one for the couples —', 'Take a moment with…'];
  const lowToMid   = ['Coming back with…', 'Let\'s bring some energy back —'];
  const openers    = ['Kicking things off with…', 'Let\'s get started —', 'Good evening everyone —'];
  const closers    = ['Closing out the set with…', 'Last one before the break —', 'To close out the set —'];
  const militaryLines = ['Thank you for your service.', 'This one goes out to everyone who\'s served.', 'We are honored to play for you tonight.'];
  const weddingLines  = ['To the happy couple!', 'Get on the dance floor for this one!'];

  const rand = arr => arr[Math.floor(Math.random() * arr.length)];

  songs.forEach((r, i) => {
    if (r.flowNote) return; // don't overwrite user edits
    const energy = getEnergyLevel(r.song);
    const prevEnergy = i > 0 ? getEnergyLevel(songs[i-1].song) : energy;
    const nextEnergy = i < songs.length-1 ? getEnergyLevel(songs[i+1].song) : energy;
    const isFirst = i === 0;
    const isLast = i === songs.length - 1;

    let note = '';
    if (isFirst) {
      note = rand(openers);
      if (isMilitary) note += ' ' + rand(militaryLines);
    } else if (isLast) {
      note = rand(closers);
    } else {
      if (prevEnergy === 3 && energy === 3) note = rand(highToHigh);
      else if (prevEnergy === 3 && energy <= 2) note = rand(highToMid);
      else if (prevEnergy <= 2 && energy === 3) note = rand(midToHigh);
      else if (prevEnergy === 2 && energy === 1) note = rand(midToLow);
      else if (prevEnergy === 1 && energy >= 2) note = rand(lowToMid);
      else note = 'Into…';
    }

    if (isWedding && i === Math.floor(songs.length / 2)) note += ' ' + rand(weddingLines);
    if (isMilitary && (r.song['Patriotic']||'').trim() && !isFirst) note += ' ' + rand(militaryLines);

    r.aiNote = note;
  });

  renderRunsheet();
}
